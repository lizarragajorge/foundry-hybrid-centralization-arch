name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bicep-validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Compile Bicep template
        run: az bicep build --file infra/main.bicep

  demo-app:
    name: Build & Test Demo App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: demo-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
